services:
  postgres:
    image: postgres:16
    container_name: depthon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: depthon_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - depthon_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d depthon_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  depthon_pgdata: